<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glossy checkmark icon">
  <defs>
    <linearGradient id="mainStroke" x1="104" y1="134" x2="414" y2="371" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7B6FF"/>
      <stop offset="0.28" stop-color="#B76CFF"/>
      <stop offset="0.58" stop-color="#5E35F2"/>
      <stop offset="0.82" stop-color="#31D8FF"/>
      <stop offset="1" stop-color="#FF5BC8"/>
    </linearGradient>

    <linearGradient id="edgeGlow" x1="95" y1="128" x2="420" y2="385" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0FF"/>
      <stop offset="0.38" stop-color="#EB8CFF"/>
      <stop offset="0.72" stop-color="#44E5FF"/>
      <stop offset="1" stop-color="#FF6BD4"/>
    </linearGradient>

    <linearGradient id="highlight" x1="126" y1="184" x2="375" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.35" stop-color="#DFF8FF" stop-opacity="0.65"/>
      <stop offset="0.72" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="lowerShade" x1="127" y1="376" x2="400" y2="151" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24116E" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#4724B8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="30" y="60" width="452" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5325D6" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#FF53CE" flood-opacity="0.14"/>
    </filter>

    <filter id="innerDepth" x="52" y="76" width="408" height="352" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="6" result="offset"/>
      <feComposite in="offset" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="innerShadow"/>
      <feColorMatrix in="innerShadow" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.06  0 0 0 0 0.42  0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>

    <path id="checkPath" d="M111 271L209 369L401 144"/>
  </defs>

  <!-- Transparent background, no decorative stars or extra elements -->
  <g filter="url(#softShadow)">
    <use href="#checkPath" stroke="#2A166E" stroke-width="88" stroke-linecap="round" stroke-linejoin="round" opacity="0.16" transform="translate(0 8)"/>
    <use href="#checkPath" stroke="url(#edgeGlow)" stroke-width="82" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#checkPath" stroke="url(#mainStroke)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" filter="url(#innerDepth)"/>
    <use href="#checkPath" stroke="url(#lowerShade)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Controlled glossy reflections -->
  <path d="M118 253L209 344L384 139" stroke="url(#highlight)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
  <path d="M145 283L209 346L359 171" stroke="#A7F4FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.34"/>
</svg>
