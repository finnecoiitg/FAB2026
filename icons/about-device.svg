<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 340" role="img" aria-label="Retro chart device">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4c4658"/>
      <stop offset="1" stop-color="#2c2838"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8f6bff"/>
      <stop offset="1" stop-color="#6d49e6"/>
    </linearGradient>
  </defs>

  <!-- purple base / shadow plate -->
  <rect x="22" y="40" width="276" height="282" rx="34" fill="#7c3cff" opacity=".9"/>

  <!-- device body -->
  <rect x="16" y="28" width="276" height="282" rx="32" fill="url(#body)" stroke="#1d1a26" stroke-width="3"/>

  <!-- top speaker dot -->
  <circle cx="256" cy="58" r="8" fill="#1d1a26"/>

  <!-- screen bezel -->
  <rect x="40" y="58" width="184" height="150" rx="14" fill="#1d1a26"/>
  <!-- screen -->
  <rect x="50" y="68" width="164" height="130" rx="8" fill="url(#screen)"/>

  <!-- screen grid -->
  <g stroke="#ffffff" stroke-width="1" opacity=".22">
    <line x1="50" y1="100" x2="214" y2="100"/>
    <line x1="50" y1="133" x2="214" y2="133"/>
    <line x1="50" y1="166" x2="214" y2="166"/>
    <line x1="92" y1="68" x2="92" y2="198"/>
    <line x1="132" y1="68" x2="132" y2="198"/>
    <line x1="173" y1="68" x2="173" y2="198"/>
  </g>

  <!-- chart line -->
  <polyline points="58,178 86,150 108,162 134,118 162,132 192,86 208,98"
    fill="none" stroke="#d6f74d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- secondary faint line -->
  <polyline points="58,186 90,172 120,176 150,150 180,156 208,128"
    fill="none" stroke="#ffffff" stroke-width="2" opacity=".55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bars at bottom of screen -->
  <g fill="#ffffff" opacity=".5">
    <rect x="60" y="184" width="6" height="10"/>
    <rect x="76" y="180" width="6" height="14"/>
    <rect x="92" y="186" width="6" height="8"/>
    <rect x="108" y="178" width="6" height="16"/>
  </g>

  <!-- buttons -->
  <circle cx="74" cy="252" r="18" fill="#d6f74d" stroke="#1d1a26" stroke-width="3"/>
  <circle cx="128" cy="252" r="18" fill="#332e40" stroke="#1d1a26" stroke-width="3"/>

  <!-- play triangle indicator -->
  <path d="M168 246 l16 8 -16 8 z" fill="#ff4fd8"/>

  <!-- brand label -->
  <text x="244" y="200" text-anchor="end" font-family="'Space Mono',monospace" font-size="18" font-weight="700" fill="#cfc5ef" opacity=".9">FAB</text>

  <!-- bottom keys -->
  <g fill="#7c3cff">
    <rect x="40" y="300" width="34" height="22" rx="5"/>
    <rect x="80" y="300" width="34" height="22" rx="5"/>
    <rect x="120" y="300" width="34" height="22" rx="5"/>
  </g>
</svg>
